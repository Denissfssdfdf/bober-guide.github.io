Героический контекст:
Название сквера неразрывно связано с героической страницей советской истории — арктической экспедицией 1934 года на пароходе «Челюскин». Масштабная спасательная операция по вызволению участников экспедиции со льдины в Чукотском море вызвала небывалый патриотический подъем по всему СССР, что привело к массовому появлению парков, улиц и скверов имени Челюскинцев в разных городах. Бобруйск не стал исключением. Однако в народной памяти закрепилось и другое, более локальное название — «сквер за театром». Это соседство с главным храмом искусства города определило судьбу парка как «театрального фойе на открытом воздухе», где актеры проводят репетиции, а зрители прогуливаются перед спектаклями или во время антракта.

Флора и ландшафт
